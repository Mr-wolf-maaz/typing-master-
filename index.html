    <!-- Structured Data - WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Typing Master",
      "description": "Free online typing tutor with interactive lessons, games, speed tests, and programming practice to help you learn touch typing and improve your typing speed.",
      "url": "https://typingmaster.com",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Touch Typing Lessons",
        "Typing Speed Tests",
        "Typing Games",
        "Programming Typing Practice",
        "Daily Practice Plans",
        "Progress Tracking",
        "WPM and Accuracy Statistics"
      ],
      "screenshot": "https://typingmaster.com/screenshot.png",
      "softwareVersion": "1.0.0",
      "author": {
        "@type": "Organization",
        "name": "Typing Master"
      }
    }
    </script>

    <!-- Structured Data - FAQPage for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is touch typing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Touch typing is a method of typing without looking at the keyboard. Your fingers learn to find the keys by muscle memory, allowing you to type much faster and more accurately."
          }
        },
        {
          "@type": "Question",
          "name": "How fast should I type?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The average typing speed is 40 WPM. A good typing speed is 60-80 WPM. Professional typists often type 80-100+ WPM. With practice, most people can reach 60+ WPM within 1-2 months."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to learn touch typing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "With 15-30 minutes of daily practice, most people can learn the basics of touch typing in 2-4 weeks. Reaching proficiency (60+ WPM with 95%+ accuracy) typically takes 1-3 months of consistent practice."
          }
        },
        {
          "@type": "Question",
          "name": "Is Typing Master free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Typing Master is completely free. All lessons, games, tests, and features are available at no cost."
          }
        }
      ]
    }
    </script>

    <!-- Structured Data - Course -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Course",
      "name": "Touch Typing Course",
      "description": "A comprehensive 14-day touch typing course covering home row, top row, bottom row, numbers, symbols, and full keyboard mastery.",
      "provider": {
        "@type": "Organization",
        "name": "Typing Master"
      },
      "isAccessibleForFree": true,
      "coursePrerequisites": "None - suitable for complete beginners",
      "educationalLevel": "Beginner to Advanced",
      "hasCourseInstance": {
        "@type": "CourseInstance",
        "courseMode": "online",
        "courseWorkload": "PT30M per day for 14 days"
      }
    }
    </script>
